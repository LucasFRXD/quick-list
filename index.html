
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>quicklist</title>
</head>

<body>

    <!-- Devido ao problema em meu compútador no laboratório que não foi resolvido, fui incapaz de realizar todos os commits solicitados, irei trocar de computador no próximo bimestre-->
    <header>
        <img src="imagens/logo.png" alt="logo do q">
    </header>

    <main>
        <section class="adicionar-item">
            <h1>Compras da semana</h1>

            <div>
                <input type="text" id="item" placeholder="Adicione um novo item">
                <button>Adicionar item</button>
            </div>
        </section>

        <section class="lista">
            <div class="item">
                <div>
                    <input type="checkbox" id="item-1">

                    <div class="checkbox-customizada"> 
                        <img src="./imagens/checked.svg" alt="checked icon">
                    </div>

                    <label for="item-1">Pão de forma</label>
                </div>

                <button>
                    <img src="/imagens/trash-icon.svg" alt="imagem do lixo">
                </button>
            </div>
        </section>

                <div>
                    <input type="checkbox" id="item-2">
                    <label for="item-2">Café preto</label>
                </div>
                <button>
                    <img src="/imagens/trash-icon.svg" alt="imagem do lixo">
                </button>
            </div>

                <div>
                    <input type="checkbox" id="item-3">
                    <label for="item-3">Suco de laranja</label>
                </div>
                
                <button>
                    <img src="/imagens/trash-icon.svg" alt="imagem do lixo">
                </button>
            </div>
        </section>
    </main>
</body>

</html>
